name: Fork Sync

permissions:
    contents: write

on:
    schedule:
        - cron: "23 18 * * *"  # 每天 02:23(北京) 同步上游
    workflow_dispatch:

jobs:
    sync_with_upstream:
        name: Sync code from upstream
        runs-on: ubuntu-latest
        steps:
            - name: Checkout target repo
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Sync code from upstream (keep our workflows)
              run: |
                  set -e
                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git remote add upstream https://github.com/huangxd-/danmu_api.git
                  git fetch upstream main
                  # 用上游最新内容覆盖工作区，但排除 .github/workflows（保护本同步脚本）
                  git checkout upstream/main -- . ':(exclude).github/workflows'
                  if git diff --cached --quiet; then
                      echo "上游无新变更，跳过"
                      exit 0
                  fi
                  git commit -m "chore(sync): 同步上游 huangxd-/danmu_api 最新代码"
                  git push origin main
                  echo "同步完成"
